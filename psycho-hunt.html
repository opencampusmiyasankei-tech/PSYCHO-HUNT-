<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PSYCHO HUNT</title>
<style>
:root{
  --void:#04070f; --panel:rgba(7,14,27,.94);
  --cyan:#00e5ff; --green:#52f2a5; --amber:#ffb02e; --red:#ff2e55;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--void);
  overflow:hidden;
  overscroll-behavior:none;
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Yu Gothic","Meiryo",sans-serif;
  color:#eaf6ff;
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
}
#game{position:fixed;inset:0;touch-action:none;display:block;}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:30;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.028) 0 1px,transparent 1px 3px);
}
.overlay{
  position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
  background:rgba(3,6,12,.6);
  backdrop-filter:blur(2px);
  padding:20px;
  transition:opacity .25s ease;
}
.overlay.hidden{opacity:0;pointer-events:none;}
.panel{
  width:min(92vw,410px);
  background:var(--panel);
  border:1px solid rgba(0,229,255,.45);
  clip-path:polygon(18px 0,100% 0,100% calc(100% - 18px),calc(100% - 18px) 100%,0 100%,0 18px);
  padding:30px 26px 26px;
  text-align:center;
  box-shadow:0 0 50px rgba(0,229,255,.12);
}
.sys{
  font-family:"Courier New",ui-monospace,monospace;
  font-size:11px;letter-spacing:.35em;color:var(--cyan);
  margin-bottom:14px;
}
.sys.red{color:var(--red);}
h1{
  font-family:"Courier New",ui-monospace,monospace;
  font-size:clamp(32px,9.5vw,44px);
  letter-spacing:.12em;font-weight:700;line-height:1.05;
}
h1 span{color:var(--cyan);text-shadow:0 0 18px rgba(0,229,255,.8);}
.tagline{font-size:13px;color:#9fb8cc;margin:10px 0 18px;}
.rules{
  list-style:none;text-align:left;font-size:13.5px;line-height:1.85;
  border-top:1px solid rgba(0,229,255,.2);
  border-bottom:1px solid rgba(0,229,255,.2);
  padding:13px 4px;margin-bottom:12px;color:#c9dcec;
}
.rules b{font-weight:700;}
.amber{color:var(--amber);} .green{color:var(--green);} .redt{color:var(--red);}
.note{font-size:12px;color:#87a3ba;margin-bottom:20px;}
button{
  font-family:inherit;
  font-size:16px;font-weight:700;letter-spacing:.2em;
  color:#04121a;background:var(--cyan);
  border:none;padding:14px 40px;cursor:pointer;
  clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
  box-shadow:0 0 24px rgba(0,229,255,.4);
  transition:transform .08s ease;
  touch-action:manipulation;
}
button:active{transform:scale(.95);}
h2{font-size:16px;font-weight:600;color:#c9dcec;margin-bottom:18px;}
.stats{
  display:grid;grid-template-columns:1fr 1fr;gap:12px 14px;
  font-family:"Courier New",ui-monospace,monospace;
  font-size:11px;letter-spacing:.14em;color:#87a3ba;
  margin-bottom:20px;text-align:center;
}
.stats span{display:block;font-size:24px;color:#eaf6ff;margin-top:3px;letter-spacing:0;}
.stats .accent{color:var(--cyan);}
.rank{
  font-size:24px;font-weight:700;color:var(--amber);
  text-shadow:0 0 14px rgba(255,176,46,.5);
  margin-bottom:6px;
}
.rankComment{font-size:13px;color:#9fb8cc;margin-bottom:22px;}
@media (prefers-reduced-motion: reduce){
  .overlay{transition:none;}
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="overlay" id="titleScreen">
  <div class="panel">
    <div class="sys">SYSTEM ONLINE</div>
    <h1>PSYCHO <span>HUNT</span></h1>
    <p class="tagline">その係数、見極められるか。</p>
    <ul class="rules">
      <li>▸ <b class="amber">係数100以上</b>はタップで<b>執行</b></li>
      <li>▸ <b class="green">100未満</b>は対象外。撃ったらアカン</li>
      <li>▸ 対象を<b class="redt">逃がしても</b>ストレス+1</li>
      <li>▸ ストレス5で任務終了や</li>
    </ul>
    <p class="note">係数300超えの赤い奴は高得点。コンボで倍率も上がるで。</p>
    <button id="startBtn">起動する</button>
  </div>
</div>

<div class="overlay hidden" id="overScreen">
  <div class="panel">
    <div class="sys red">MISSION FAILED</div>
    <h2>エリア・ストレスが限界に達した</h2>
    <div class="stats">
      <div>SCORE<span id="finalScore" class="accent">0</span></div>
      <div>BEST<span id="bestScore">0</span></div>
      <div>MAX COMBO<span id="finalCombo">0</span></div>
      <div>執行数<span id="finalKills">0</span></div>
    </div>
    <div class="rank" id="rankName"></div>
    <div class="rankComment" id="rankComment"></div>
    <button id="retryBtn">再出動</button>
  </div>
</div>

<script>
'use strict';
// ===== Canvas setup =====
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var W = 0, H = 0;
var buildings = [];
var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function makeSkyline(){
  buildings = [];
  var x = -20;
  while (x < W + 40){
    var bw = 24 + Math.random() * 60;
    var bh = H * (0.08 + Math.random() * 0.16);
    var win = [];
    var n = Math.floor(Math.random() * 5);
    for (var i = 0; i < n; i++){
      win.push({ wx: 4 + Math.random() * (bw - 8), wy: 8 + Math.random() * (bh - 16) });
    }
    buildings.push({ x: x, w: bw, h: bh, win: win });
    x += bw + 6 + Math.random() * 18;
  }
}
function resize(){
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  makeSkyline();
}
window.addEventListener('resize', resize);
resize();

// ===== Audio =====
var audioCtx = null;
function initAudio(){
  if (!audioCtx){
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur, type, vol, slideTo){
  if (!audioCtx) return;
  try {
    var t0 = audioCtx.currentTime;
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, t0);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(30, slideTo), t0 + dur);
    g.gain.setValueAtTime(vol || 0.12, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t0); o.stop(t0 + dur + 0.02);
  } catch(e){}
}

// ===== Game state =====
var state = 'title';
var score = 0, best = 0, combo = 0, maxCombo = 0, stress = 0, kills = 0;
var MAX_STRESS = 5;
var targets = [], particles = [], floaters = [];
var elapsed = 0, spawnTimer = 0.8;
var shake = 0, glitchT = 0, stressFlash = 0;

var C_CYAN = '#00e5ff', C_GREEN = '#52f2a5', C_AMBER = '#ffb02e', C_RED = '#ff2e55';
function coefColor(c){ return c < 100 ? C_GREEN : (c < 300 ? C_AMBER : C_RED); }
function difficulty(){ return Math.min(1, elapsed / 100); }

function spawnTarget(){
  var d = difficulty();
  var fromLeft = Math.random() < 0.5;
  var topPad = 90, botPad = H * 0.16 + 30;
  var y = topPad + Math.random() * Math.max(60, H - topPad - botPad);
  var speed = (46 + Math.random() * 34) * (1 + d * 1.25);
  var coef;
  if (Math.random() < 0.16 + d * 0.30){
    coef = 80 + Math.floor(Math.random() * 41); // 80-120: borderline, read carefully
  } else {
    var r = Math.random();
    if (r < 0.42) coef = 15 + Math.floor(Math.random() * 65);
    else if (r < 0.85) coef = 125 + Math.floor(Math.random() * 165);
    else coef = 300 + Math.floor(Math.random() * 260);
  }
  var size = Math.max(24, Math.min(34, W * 0.042));
  targets.push({
    x: fromLeft ? -50 : W + 50, y: y,
    vx: fromLeft ? speed : -speed,
    vy: (Math.random() - 0.5) * 10,
    r: size, coef: coef,
    scan: 0, scanDelay: 0.3 + Math.random() * 0.35,
    age: 0, dead: false, deathT: 0, gone: false,
    phase: Math.random() * Math.PI * 2
  });
}

function addFloater(x, y, txt, color, size){
  floaters.push({ x: x, y: y, txt: txt, color: color, size: size || 14, age: 0, life: 0.9 });
}
function burst(x, y, color, n, power){
  for (var i = 0; i < n; i++){
    var a = Math.random() * Math.PI * 2;
    var sp = (0.35 + Math.random() * 0.65) * power;
    particles.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 0.3 + Math.random() * 0.35, age: 0, color: color, r: 1.5 + Math.random() * 2.5 });
  }
}
function addStress(msg, x, y){
  stress++;
  stressFlash = 0.5;
  combo = 0;
  addFloater(x, y, msg, C_RED, 16);
  beep(180, 0.22, 'sawtooth', 0.15, 90);
  if (!reduceMotion) glitchT = Math.max(glitchT, 0.3);
  if (stress >= MAX_STRESS) gameOver();
}

function judge(t){
  if (t.dead) return;
  t.dead = true; t.deathT = 0;
  if (t.coef >= 100){
    kills++;
    combo++;
    if (combo > maxCombo) maxCombo = combo;
    var lethal = t.coef >= 300;
    var base = lethal ? 300 : 100;
    var gain = Math.round(base * (1 + Math.min(combo, 30) * 0.1));
    score += gain;
    if (lethal){
      if (!reduceMotion) shake = 12;
      burst(t.x, t.y, C_RED, 26, 320);
      burst(t.x, t.y, '#ffffff', 8, 180);
      addFloater(t.x, t.y - t.r * 1.4, '+' + gain + ' ELIMINATOR', C_RED, 17);
      beep(150, 0.3, 'sawtooth', 0.2, 55);
    } else {
      if (!reduceMotion) shake = 5;
      burst(t.x, t.y, C_CYAN, 16, 220);
      addFloater(t.x, t.y - t.r * 1.4, '+' + gain + ' PARALYZER', C_CYAN, 15);
      beep(760, 0.12, 'square', 0.12, 340);
    }
  } else {
    burst(t.x, t.y, C_GREEN, 10, 140);
    addStress('執行対象外や！', t.x, t.y - t.r * 1.6);
  }
}

// ===== Update =====
function update(dt){
  elapsed += dt;
  var d = difficulty();
  spawnTimer -= dt;
  if (spawnTimer <= 0){
    spawnTarget();
    if (Math.random() < d * 0.45) spawnTarget();
    var interval = 1.55 - d * 0.95;
    spawnTimer = interval * (0.75 + Math.random() * 0.5);
  }
  for (var i = 0; i < targets.length; i++){
    var t = targets[i];
    t.age += dt;
    if (t.dead){
      t.deathT += dt;
      if (t.deathT > 0.35) t.gone = true;
      continue;
    }
    t.x += t.vx * dt;
    t.y += t.vy * dt;
    if (t.age > t.scanDelay) t.scan = Math.min(1, t.scan + dt / 0.45);
    var off = 60;
    if ((t.vx > 0 && t.x > W + off) || (t.vx < 0 && t.x < -off)){
      t.gone = true;
      if (t.coef >= 100 && state === 'playing'){
        var ex = t.vx > 0 ? W - 60 : 60;
        addStress('対象逃走…', ex, t.y);
      }
    }
  }
  targets = targets.filter(function(t){ return !t.gone; });
  stepFx(dt);
}
function stepFx(dt){
  for (var i = 0; i < particles.length; i++){
    var p = particles[i];
    p.age += dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 240 * dt;
  }
  particles = particles.filter(function(p){ return p.age < p.life; });
  for (var j = 0; j < floaters.length; j++){
    floaters[j].age += dt; floaters[j].y -= 34 * dt;
  }
  floaters = floaters.filter(function(f){ return f.age < f.life; });
  shake = Math.max(0, shake - dt * 34);
  glitchT = Math.max(0, glitchT - dt);
  stressFlash = Math.max(0, stressFlash - dt);
}

// ===== Render =====
function render(){
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#04070f');
  g.addColorStop(0.7, '#071021');
  g.addColorStop(1, '#0a1626');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  if (shake > 0){
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  }
  drawGrid();
  drawSkyline();
  for (var i = 0; i < targets.length; i++) drawTarget(targets[i]);
  drawParticles();
  drawFloaters();
  ctx.restore();

  if (glitchT > 0) drawGlitch();
  if (stressFlash > 0) drawStressVignette();
  if (state === 'playing') drawHUD();
}

function drawGrid(){
  ctx.strokeStyle = 'rgba(0,229,255,0.05)';
  ctx.lineWidth = 1;
  var gy = H * 0.72;
  for (var i = 0; i < 7; i++){
    var y = gy + (H - gy) * (i / 6);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (var x = 0; x <= W; x += 64){
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
}
function drawSkyline(){
  ctx.fillStyle = '#060b16';
  var i, b;
  for (i = 0; i < buildings.length; i++){
    b = buildings[i];
    ctx.fillRect(b.x, H - b.h, b.w, b.h);
  }
  ctx.fillStyle = 'rgba(0,229,255,0.35)';
  for (i = 0; i < buildings.length; i++){
    b = buildings[i];
    for (var j = 0; j < b.win.length; j++){
      ctx.fillRect(b.x + b.win[j].wx, H - b.h + b.win[j].wy, 2, 2);
    }
  }
}
function drawTarget(t){
  var revealed = t.scan >= 1;
  var col = revealed ? coefColor(t.coef) : C_CYAN;
  var bob = Math.sin(t.age * 5 + t.phase) * 2.5;
  var alpha = 1, scale = 1;
  if (t.dead){
    var k = t.deathT / 0.35;
    alpha = 1 - k;
    scale = 1 + k * 0.5;
  } else if (t.age < 0.3){
    alpha = t.age / 0.3;
  }
  ctx.save();
  ctx.translate(t.x, t.y + bob);
  ctx.scale(scale, scale);
  ctx.globalAlpha = Math.max(0, alpha);
  var s = t.r / 30;
  var lw = 2;
  if (revealed && t.coef >= 300 && !t.dead){
    lw = 2 + Math.sin(t.age * 14);
  }
  ctx.shadowColor = col;
  ctx.shadowBlur = 16;
  ctx.fillStyle = '#0b1626';
  ctx.strokeStyle = col;
  ctx.lineWidth = lw;
  // head
  ctx.beginPath();
  ctx.arc(0, -24 * s, 8.5 * s, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // body
  ctx.beginPath();
  ctx.moveTo(-12 * s, -11 * s);
  ctx.quadraticCurveTo(0, -19 * s, 12 * s, -11 * s);
  ctx.lineTo(8.5 * s, 26 * s);
  ctx.lineTo(-8.5 * s, 26 * s);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  if (!t.dead && t.scan > 0){
    ctx.save();
    ctx.translate(t.x, t.y + bob);
    ctx.globalAlpha = Math.max(0, alpha);
    if (!revealed){
      ctx.strokeStyle = 'rgba(0,229,255,0.8)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(0, 0, t.r * 1.35, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * t.scan);
      ctx.stroke();
    }
    var shownVal = revealed ? t.coef : Math.floor(t.coef * t.scan + Math.random() * 40);
    var label = String(shownVal);
    var fs = Math.max(15, t.r * 0.62);
    ctx.font = '700 ' + fs + 'px "Courier New", ui-monospace, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var ly = -t.r * 1.85;
    var tw = ctx.measureText(label).width;
    var bw2 = tw / 2 + 8, bh2 = fs * 0.75;
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-bw2 + 5, ly - bh2);
    ctx.lineTo(-bw2, ly - bh2);
    ctx.lineTo(-bw2, ly + bh2);
    ctx.lineTo(-bw2 + 5, ly + bh2);
    ctx.moveTo(bw2 - 5, ly - bh2);
    ctx.lineTo(bw2, ly - bh2);
    ctx.lineTo(bw2, ly + bh2);
    ctx.lineTo(bw2 - 5, ly + bh2);
    ctx.stroke();
    ctx.fillStyle = col;
    ctx.shadowColor = col;
    ctx.shadowBlur = revealed ? 10 : 4;
    ctx.fillText(label, 0, ly);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}
function drawParticles(){
  for (var i = 0; i < particles.length; i++){
    var p = particles[i];
    var k = 1 - p.age / p.life;
    ctx.globalAlpha = Math.max(0, k);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * k + 0.4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}
function drawFloaters(){
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (var i = 0; i < floaters.length; i++){
    var f = floaters[i];
    var k = 1 - f.age / f.life;
    ctx.globalAlpha = Math.max(0, Math.min(1, k * 1.4));
    ctx.font = '700 ' + f.size + 'px "Courier New", ui-monospace, monospace';
    ctx.fillStyle = f.color;
    ctx.shadowColor = f.color;
    ctx.shadowBlur = 8;
    ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}
function drawGlitch(){
  for (var i = 0; i < 4; i++){
    var y = Math.random() * H;
    var h = 2 + Math.random() * 8;
    ctx.fillStyle = Math.random() < 0.5 ? 'rgba(255,46,85,0.18)' : 'rgba(0,229,255,0.18)';
    ctx.fillRect(0, y, W, h);
  }
}
function drawStressVignette(){
  var k = stressFlash / 0.5;
  var g = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.75);
  g.addColorStop(0, 'rgba(255,46,85,0)');
  g.addColorStop(1, 'rgba(255,46,85,' + (0.35 * k).toFixed(3) + ')');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}
function drawHex(cx, cy, r, filled){
  ctx.beginPath();
  for (var i = 0; i < 6; i++){
    var a = Math.PI / 6 + i * Math.PI / 3;
    var px = cx + Math.cos(a) * r, py = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  if (filled){
    ctx.fillStyle = C_RED;
    ctx.shadowColor = C_RED; ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
  } else {
    ctx.strokeStyle = 'rgba(0,229,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}
function drawHUD(){
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.font = '700 12px "Courier New", ui-monospace, monospace';
  ctx.fillStyle = 'rgba(0,229,255,0.7)';
  ctx.fillText('SCORE', 16, 22);
  ctx.font = '700 24px "Courier New", ui-monospace, monospace';
  ctx.fillStyle = '#eaf6ff';
  ctx.fillText(String(score), 16, 46);
  if (combo >= 2){
    ctx.textAlign = 'center';
    ctx.font = '700 16px "Courier New", ui-monospace, monospace';
    ctx.fillStyle = C_AMBER;
    ctx.shadowColor = C_AMBER; ctx.shadowBlur = 8;
    ctx.fillText(combo + ' COMBO', W / 2, 34);
    ctx.shadowBlur = 0;
  }
  var hr = 9, gap = 26;
  var sx = W - 16 - hr - (MAX_STRESS - 1) * gap;
  ctx.textAlign = 'right';
  ctx.font = '700 10px "Courier New", ui-monospace, monospace';
  ctx.fillStyle = 'rgba(255,46,85,0.75)';
  ctx.fillText('AREA STRESS', W - 16, 14);
  for (var i = 0; i < MAX_STRESS; i++){
    drawHex(sx + i * gap, 34, hr, i < stress);
  }
  if (elapsed < 8){
    ctx.textAlign = 'center';
    ctx.font = '12px "Hiragino Kaku Gothic ProN", sans-serif';
    ctx.globalAlpha = Math.max(0, Math.min(1, 8 - elapsed));
    ctx.fillStyle = 'rgba(234,246,255,0.8)';
    ctx.fillText('係数100以上 → タップで執行 ／ 100未満 → 撃たんとき', W / 2, H - 28);
    ctx.globalAlpha = 1;
  }
}

// ===== Input =====
canvas.addEventListener('pointerdown', function(e){
  if (state !== 'playing') return;
  initAudio();
  var rect = canvas.getBoundingClientRect();
  var x = e.clientX - rect.left;
  var y = e.clientY - rect.top;
  var hit = null, hd = Infinity;
  for (var i = 0; i < targets.length; i++){
    var t = targets[i];
    if (t.dead) continue;
    var d = Math.hypot(t.x - x, t.y - y);
    if (d < t.r * 1.9 && d < hd){ hd = d; hit = t; }
  }
  if (hit){
    judge(hit);
  } else {
    particles.push({ x: x, y: y, vx: 0, vy: 0, life: 0.25, age: 0, color: 'rgba(0,229,255,0.5)', r: 4 });
    beep(220, 0.05, 'square', 0.05);
  }
});
canvas.addEventListener('contextmenu', function(e){ e.preventDefault(); });

// ===== Flow =====
function startGame(){
  score = 0; combo = 0; maxCombo = 0; stress = 0; kills = 0;
  targets = []; particles = []; floaters = [];
  elapsed = 0; spawnTimer = 0.6; shake = 0; glitchT = 0; stressFlash = 0;
  state = 'playing';
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('overScreen').classList.add('hidden');
  beep(520, 0.09, 'square', 0.1, 1040);
}
var RANKS = [
  [800, '訓練生', 'まだ慣らし運転やな。次いこ、次。'],
  [2500, '監視官候補生', '筋はええ。判断がちょい甘いだけや。'],
  [6000, '監視官', 'ええ目してるやん。現場向きや。'],
  [12000, '執行官', 'その冷静さ、本物や。'],
  [20000, '一級執行官', '完全に頭冷えとる。強い。'],
  [Infinity, '伝説のハンター', '係数、見えとるやろ。異常や（褒め言葉）。']
];
function gameOver(){
  if (state !== 'playing') return;
  state = 'over';
  if (score > best) best = score;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('bestScore').textContent = best;
  document.getElementById('finalCombo').textContent = maxCombo;
  document.getElementById('finalKills').textContent = kills;
  var rank = RANKS[0];
  for (var i = 0; i < RANKS.length; i++){
    if (score < RANKS[i][0]){ rank = RANKS[i]; break; }
  }
  document.getElementById('rankName').textContent = rank[1];
  document.getElementById('rankComment').textContent = rank[2];
  beep(320, 0.5, 'sawtooth', 0.15, 70);
  setTimeout(function(){
    document.getElementById('overScreen').classList.remove('hidden');
  }, 550);
}
document.getElementById('startBtn').addEventListener('click', function(){ initAudio(); startGame(); });
document.getElementById('retryBtn').addEventListener('click', function(){ initAudio(); startGame(); });

// ===== Main loop =====
var lastTime = performance.now();
function loop(now){
  var dt = (now - lastTime) / 1000;
  lastTime = now;
  if (dt > 0.06) dt = 0.06;
  if (state === 'playing') update(dt);
  else stepFx(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
